---
# DNF Optimization
dnf_max_parallel_downloads: 15
dnf_fastestmirror: "True"

# GRUB Settings
grub_timeout: 15
grub_gfxmode: "1920x1080x32,1280x720x32,auto"
grub_gfxpayload: "keep"
grub_terminal_output: "gfxterm"

# Hardware Drivers
intel_media_packages:
  - libva-intel-driver
  - intel-media-driver
  - libvdpau-va-gl

amd_multimedia_packages:
  - mesa-va-drivers-freeworld
  - mesa-vdpau-drivers-freeworld
  - libva-utils
  - vdpauinfo

nvidia_packages_stage1:
  - akmods
  - kmodtool
  - openssl
  - mokutil

nvidia_packages_stage2:
  - akmod-nvidia
  - gcc
  - kernel-devel
  - kernel-headers
  - xorg-x11-drv-nvidia
  - xorg-x11-drv-nvidia-cuda
  - xorg-x11-drv-nvidia-libs
  - xorg-x11-drv-nvidia-libs.i686
  - xorg-x11-drv-nvidia-power
  - xorg-x11-drv-nvidia-cuda-libs
  - vulkan

nvidia_dpm_config: |
  # Enable DynamicPowerManagement
  # http://download.nvidia.com/XFree86/Linux-x86_64/440.31/README/dynamicpowermanagement.html
  options nvidia NVreg_DynamicPowerManagement=0x02
  options nvidia NVreg_TemporaryFilePath=/var/tmp

# Package Lists from .packages files
dnf_packages_common:
  - argyllcms
  - btrfs-assistant
  - chromium
  - clamav
  - clamav-update
  - fastfetch
  - hwinfo
  - lm_sensors
  - nodejs
  - nvtop
  - python3-pip
  - p7zip
  - p7zip-plugins
  - rawtherapee
  - solaar
  - steam
  - testdisk
  - unrar
  - unzip
  - vim
  - virtualbox
  - vlc
  - vlc-bittorrent

dnf_packages_gnome:
  - flatseal
  - gnome-tweaks

dnf_packages_kde:
  - ktorrent

flatpak_apps_common:
  - com.bitwarden.desktop
  - com.dec05eba.gpu_screen_recorder
  - com.google.AndroidStudio
  - com.jetbrains.IntelliJ-IDEA-Community
  - com.jetbrains.PyCharm-Professional
  - com.spotify.Client
  - net.displaycal.DisplayCAL
  - org.ferdium.Ferdium
  - org.zotero.Zotero
  - us.zoom.Zoom

flatpak_apps_gnome:
  - com.github.unrud.VideoDownloader
  - com.mattjakeman.ExtensionManager
  - de.haeckerfelix.Fragments

flatpak_apps_kde:
  - com.markopejic.downloader

fonts_packages:
  - fira-code-fonts
  - google-roboto-fonts

# Oh-My-Zsh settings
omz_theme_url: "https://raw.githubusercontent.com/phguima/fedora_stuffs/main/omz-themes/kali-like-alt.zsh-theme"