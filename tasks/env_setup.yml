---
# Environment discovery and setup for all stages

- name: Env Setup | Get primary user data
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_env.SUDO_USER }}"
  register: primary_user_data
  when: ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root'

- name: Env Setup | Set primary user facts
  set_fact:
    user_name: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    user_home: >-
      {{ 
        primary_user_data.ansible_facts.getent_passwd[ansible_env.SUDO_USER][4] 
        if (primary_user_data.ansible_facts is defined and ansible_env.SUDO_USER is defined and ansible_env.SUDO_USER != 'root') 
        else (ansible_env.HOME | default('/root')) 
      }}
  tags: [always]

- name: Env Setup | Identify target users for shell setup
  set_fact:
    zsh_users:
      - name: "root"
        home: "/root"
      - name: "{{ user_name }}"
        home: "{{ user_home }}"
  when: user_name != 'root'

- name: Env Setup | Identify target users for shell setup (Root only)
  set_fact:
    zsh_users:
      - name: "root"
        home: "/root"
  when: user_name == 'root'

- name: Env Setup | Detect ASUS system
  set_fact:
    is_asus: "{{ (ansible_system_vendor | default('') | lower is search('asus')) or (ansible_board_vendor | default('') | lower is search('asus')) }}"
  tags: [hardware, asus]

- name: Env Setup | Detect GPU Type
  ansible.builtin.shell: lspci | grep -iE "vga|3d|display"
  register: gpu_info_raw
  changed_when: false
  failed_when: false
  tags: [hardware]

- name: Env Setup | Set GPU info fact
  set_fact:
    gpu_info: "{{ gpu_info_raw.stdout | default('') }}"
    is_nvidia: "{{ gpu_info_raw.stdout is defined and gpu_info_raw.stdout is search('NVIDIA', ignorecase=True) }}"
    is_intel: "{{ gpu_info_raw.stdout is defined and gpu_info_raw.stdout is search('Intel', ignorecase=True) }}"
    is_amd: "{{ gpu_info_raw.stdout is defined and gpu_info_raw.stdout is regex('\\b(amd|ati|Advanced Micro Devices)\\b', ignorecase=True) }}"
  tags: [hardware]

- name: Env Setup | Check for proprietary NVIDIA driver
  ansible.builtin.command: nvidia-smi
  register: nvidia_smi_check_raw
  ignore_errors: yes 
  changed_when: false
  tags: [hardware, detection, nvidia]

- name: Env Setup | Set NVIDIA driver fact
  set_fact:
    has_nvidia_driver: "{{ nvidia_smi_check_raw.rc == 0 }}"
  tags: [hardware, detection, nvidia]

- name: Env Setup | Detect desktop environment
  set_fact:
    detected_xdg: "{{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('') | upper }}"
  tags: [system, detection]

- name: Env Setup | Set DE Boolean Facts
  set_fact:
    is_gnome: "{{ 'GNOME' in detected_xdg }}"
    is_kde: "{{ 'KDE' in detected_xdg or 'PLASMA' in detected_xdg or 'KDE' in (ansible_env.XDG_CURRENT_DESKTOP | default('') | upper) }}"
  tags: [system, detection]
