---
- name: Fedora Post-Install Setup - Stage 2 - Software Installation and Configuration
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml
    - vars/secrets.yml

  tasks:
    - name: Import environment setup tasks
      ansible.builtin.import_tasks: tasks/env_setup.yml
      tags: [always]

    - name: System | Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
      tags: [system, flatpak]
    
    - name: Shell | Create 'wks' directory in home
      ansible.builtin.file:
        path: "{{ user_home }}/wks"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0755'
      when: user_name != 'root'
      tags: [shell, workspace]
    
    # --- System Tweaks ---
    - name: System | Set hostname
      ansible.builtin.hostname:
        name: "{{ system_hostname }}"
      tags: [system, hostname]
    
    # --- NVIDIA Driver Installation ---
    - name: Hardware | NVIDIA Proprietary Driver
      ansible.builtin.import_tasks: tasks/nvidia_driver.yml
      tags: [hardware, nvidia, driver]

    # --- GPU Specific Hardware Acceleration ---      
    - name: Hardware | Install NVIDIA VA-API and NVENC/NVDEC support
      ansible.builtin.dnf:
        name: "{{ nvidia_multimedia_packages }}"
        state: present
      when: is_nvidia and has_nvidia_driver
      tags: [software, multimedia, nvidia]

    - name: Hardware | Install intel media drivers
      ansible.builtin.dnf:
        name: "{{ intel_media_packages }}"
        state: present
      when: is_intel
      tags: [hardware, intel]

    - name: Hardware | Install AMD VA-API and VDPAU (Freeworld)
      ansible.builtin.dnf:
        name: "{{ amd_multimedia_packages }}"
        state: present
        allowerasing: true
      when: is_amd
      tags: [hardware, amd]
    
    # --- Multimedia Codecs & FFmpeg Swap ---
    - name: Codecs | Swap ffmpeg-free for full ffmpeg (RPM Fusion)
      ansible.builtin.dnf:
        name: ffmpeg
        allowerasing: yes
        state: present
      tags: [software, multimedia, ffmpeg]

    - name: Codecs | Install Multimedia Group and Codecs
      ansible.builtin.dnf:
        name: "{{ multimedia_packages }}"
        state: present
        update_cache: yes
      tags: [software, multimedia]
    
    # --- NVIDIA Power Management Configuration ---
    - name: Hardware | Configure NVIDIA Power Management
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: |
          # Enable deep power management
          options nvidia NVreg_DynamicPowerManagement=0x02
          options nvidia NVreg_EnableS0ixPowerManagement=1

          # Improve suspend/resume stability (Fedora uses tmpfs for /tmp)
          options nvidia NVreg_TemporaryFilePath=/var/tmp
        owner: root
        group: root
        mode: '0644'
      when: is_nvidia and has_nvidia_driver
      tags: [hardware, nvidia, power]

    
    # --- Kernel Maintenance ---
    - name: Kernel | Ensure not running a debug kernel
      ansible.builtin.assert:
        that: "'debug' not in ansible_kernel"
        fail_msg: "You are currently running a DEBUG kernel ({{ ansible_kernel }}). Please boot into a normal kernel before proceeding."
      tags: [system, kernel]

    - name: Kernel | Remove kernel debug packages
      ansible.builtin.dnf:
        name: "kernel*debug*"
        state: absent
      tags: [system, kernel]

    - name: Kernel | Disable debug repositories
      ansible.builtin.shell: dnf config-manager setopt "*debug*".enabled=0
      changed_when: false # config-manager always reports success, we'll assume it's fine
      tags: [system, kernel]

    - name: Kernel | Get list of old kernels
      ansible.builtin.shell: dnf repoquery --installonly --latest-limit=-1 -q
      register: old_kernels_list
      changed_when: false
      failed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove old kernels
      ansible.builtin.dnf:
        name: "{{ old_kernels_list.stdout_lines }}"
        state: absent
      when: 
        - old_kernels_list.stdout_lines is defined
        - old_kernels_list.stdout_lines | length > 0
      tags: [system, kernel]

    
    # --- Fonts Installation ---
    - name: Software | Install Selected Fonts
      ansible.builtin.dnf:
        name: "{{ fonts_packages }}"
        state: present
      tags: [software, fonts]
    
    # --- ASUS ROG Installation ---
    - name: ASUS | Enable ROG copr repository
      community.general.copr:
        name: "{{ asus_copr_repo }}"
        state: enabled
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Refresh DNF cache for copr
      ansible.builtin.dnf:
        update_cache: yes
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Install ASUS ROG packages
      ansible.builtin.dnf:
        name: "{{ asus_packages }}"
        state: present
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Enable and start supergfxd.service
      ansible.builtin.systemd:
        name: supergfxd.service
        enabled: yes
        state: started
      when: is_asus
      tags: [hardware, asus]

    - name: ASUS | Ensure autostart directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.config/autostart"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0755'
      when: is_asus and user_name != 'root'
      tags: [hardware, asus]

    - name: ASUS | Add ASUS ROG GUI to autostart
      ansible.builtin.copy:
        src: "/usr/share/applications/rog-control-center.desktop"
        dest: "{{ user_home }}/.config/autostart/rog-control-center.desktop"
        remote_src: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0644'
      when: is_asus and user_name != 'root'
      tags: [hardware, asus]
    
    # --- Software Installation ---
    - name: Software | Install KDE specific DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_kde }}"
        state: present
      when: is_kde
      tags: [software, dnf, kde]
    
    - name: Software | Install GNOME specific DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_gnome }}"
        state: present
      when: is_gnome
      tags: [software, dnf, gnome]
    
    - name: Software | Install DNF packages
      ansible.builtin.dnf:
        name: "{{ dnf_packages_common }}"
        state: present
      tags: [software, dnf, common]
    
    # --- Brave Installation ---
    - name: Brave | Add Brave repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: Brave Browser
        baseurl: "{{ brave_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ brave_gpg_key }}"
      tags: [software, brave]

    - name: Brave | Install Brave
      ansible.builtin.dnf:
        name: brave-browser
        state: present
      tags: [software, brave]
    
    # --- Visual Studio Code Installation ---
    - name: VSCode | Add Visual Studio Code repository
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: "{{ vscode_repo_url }}"
        enabled: yes
        gpgcheck: yes
        gpgkey: "{{ vscode_gpg_key }}"
      tags: [software, vscode]

    - name: VSCode | Install Visual Studio Code
      ansible.builtin.dnf:
        name: code
        state: present
      tags: [software, vscode]
    
    # --- GeminiCLI Installation ---
    - name: Software | Install GeminiCLI globally
      community.general.npm:
        name: "@google/gemini-cli"
        global: yes
        state: present
      tags: [software, gemini]

     # --- ProtonVPN Installation ---
    - name: ProtonVPN | Install ProtonVPN repository
      ansible.builtin.dnf:
        name: "{{ protonvpn_repo_url }}"
        state: present
        disable_gpg_check: yes
      tags: [software, protonvpn]

    - name: ProtonVPN | Refresh DNF cache for ProtonVPN
      ansible.builtin.command: dnf makecache --refresh
      changed_when: false
      tags: [software, protonvpn]

    - name: ProtonVPN | Install ProtonVPN dependencies
      ansible.builtin.dnf:
        name: python3-pip
        state: present
      tags: [software, protonvpn]

    - name: ProtonVPN | Install ProtonVPN application
      ansible.builtin.dnf:
        name: proton-vpn-gnome-desktop
        state: present
      register: protonvpn_install
      ignore_errors: yes
      tags: [software, protonvpn]

    - name: ProtonVPN | Verify ProtonVPN installation
      ansible.builtin.command: rpm -q proton-vpn-gnome-desktop
      changed_when: false
      failed_when: false
      register: protonvpn_check
      tags: [software, protonvpn]

    - name: ProtonVPN | Report ProtonVPN status
      ansible.builtin.debug:
        msg: "ProtonVPN was installed successfully (despite potential scriptlet warnings)."
      when: protonvpn_check.rc == 0
      tags: [software, protonvpn]
    
    # --- Flatpak Applications ---
    - name: Software | Install KDE specific flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_kde }}"
      when: is_kde
      tags: [software, flatpak, kde]

    - name: Software | Install GNOME specific flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_gnome }}"
      when: is_gnome
      tags: [software, flatpak, gnome]

    - name: Software | Install flatpak applications
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps_common }}"
      tags: [software, flatpak, common]
    
    # --- Cedilla Configuration ---
    - name: Cedilla | Set target user facts
      set_fact:
        target_user_name: "{{ user_name }}"
        target_user_home: "{{ user_home }}"
      when: user_name != 'root'
      tags: [always]
    
    - name: Cedilla | Find system compose file
      ansible.builtin.shell: |
        LANG_VAL=${LANG:=en_US.UTF-8}
        COMPOSE_DIR="/usr/share/X11/locale"
        sed -ne "s/^\([^:]*\):[ \t]*$LANG_VAL/\1/p" <"${COMPOSE_DIR}/compose.dir" | head -1
      register: system_compose_name
      changed_when: false
      tags: [system, cedilla]

    - name: Cedilla | Ensure .XCompose exists (copy from system)
      ansible.builtin.copy:
        src: "/usr/share/X11/locale/{{ system_compose_name.stdout }}"
        dest: "{{ target_user_home }}/.XCompose"
        remote_src: yes
        owner: "{{ target_user_name }}"
        group: "{{ target_user_name }}"
        mode: '0644'
        force: no # Keep existing file if present
      when: 
        - system_compose_name.stdout != ""
        - target_user_home is defined
      tags: [system, cedilla]

    - name: Cedilla | Apply character mapping for cedilla (ç)
      ansible.builtin.replace:
        path: "{{ target_user_home }}/.XCompose"
        regexp: "{{ item.regex }}"
        replace: "{{ item.replace }}"
      loop:
        - { regex: '\u0107', replace: '\u00e7' } # ć -> ç (lowercase)
        - { regex: '\u0106', replace: '\u00c7' } # Ć -> Ç (uppercase)
      when: target_user_home is defined
      tags: [system, cedilla]


    - name: Cedilla | Apply Flatpak overrides for Bitwarden (KDE)
      ansible.builtin.command:
        cmd: "flatpak override --user --nosocket=wayland --env=GTK_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 com.bitwarden.desktop"
      become_user: "{{ target_user_name }}"
      register: bitwarden_override_kde
      failed_when: false
      changed_when: false
      tags: [system, cedilla, flatpak]
    
    - name: Cedilla | Apply Flatpak overrides for Zoom (KDE)
      ansible.builtin.command:
        cmd: "flatpak override --user --nosocket=wayland --env=GTK_IM_MODULE=cedilla --env=QT_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 --filesystem=home us.zoom.Zoom"
      become_user: "{{ target_user_name }}"
      register: zoom_override
      failed_when: false
      changed_when: false
      tags: [system, zoom, cedilla, flatpak]

    - name: Cedilla | Ensure local applications directory exists
      ansible.builtin.file:
        path: "{{ target_user_home }}/.local/share/applications"
        state: directory
        owner: "{{ target_user_name }}"
        group: "{{ target_user_name }}"
        mode: '0755'
      tags: [brave, cedilla]

    - name: Cedilla | Copy Brave desktop file to local share
      ansible.builtin.copy:
        src: /usr/share/applications/brave-browser.desktop
        dest: "{{ target_user_home }}/.local/share/applications/brave-browser.desktop"
        remote_src: yes
        owner: "{{ target_user_name }}"
        group: "{{ target_user_name }}"
        mode: '0644'
        force: no
      tags: [brave, cedilla]

    - name: Cedilla | Configure Brave to use X11 ozone platform
      ansible.builtin.replace:
        path: "{{ target_user_home }}/.local/share/applications/brave-browser.desktop"
        regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
        replace: 'Exec=\1 --ozone-platform=x11\2'
      tags: [brave, cedilla]

    - name: Cedilla | Copy Chromium desktop file to local share
      ansible.builtin.copy:
        src: /usr/share/applications/chromium-browser.desktop
        dest: "{{ target_user_home }}/.local/share/applications/chromium-browser.desktop"
        remote_src: yes
        owner: "{{ target_user_name }}"
        group: "{{ target_user_name }}"
        mode: '0644'
        force: no
      tags: [chromium, cedilla]

    - name: Cedilla | Configure Chromium to use X11 ozone platform
      ansible.builtin.replace:
        path: "{{ target_user_home }}/.local/share/applications/chromium-browser.desktop"
        regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
        replace: 'Exec=\1 --ozone-platform=x11\2'
      tags: [chromium, cedilla]

    - name: Cedilla | Update desktop database
      ansible.builtin.command:
        cmd: "update-desktop-database {{ target_user_home }}/.local/share/applications/"
      become_user: "{{ target_user_name }}"
      changed_when: false
      tags: [brave, chromium, cedilla]

    - name: Cedilla | Display completion message
      ansible.builtin.debug:
        msg: 
          - "Cedilla fix applied to {{ target_user_home }}/.XCompose."
          - "Please log out of your session and re-login to effect changes."
      tags: [system, cedilla]

    # --- NVIDIA Applications Overrides Configuration ---
    - name: Shortcuts | Create local override for Steam shortcut
      ansible.builtin.copy:
        src: /usr/share/applications/steam.desktop
        dest: "{{ user_home }}/.local/share/applications/steam.desktop"
        remote_src: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0644'
        force: no
      when: user_name != 'root'
      tags: [software, steam, gpu]

    - name: Shortcuts | Update Exec line to use NVIDIA GPU
      ansible.builtin.replace:
        path: "{{ user_home }}/.local/share/applications/steam.desktop"
        regexp: '^Exec=/usr/bin/steam\s+(.*)$'
        replace: 'Exec=env __NV_PRIME_RENDER_OFFLOAD=1 __NV_PRIME_RENDER_OFFLOAD_PROVIDER=NVIDIA-G0 __GLX_VENDOR_LIBRARY_NAME=nvidia /usr/bin/steam \1'
      when: user_name != 'root'
      tags: [software, steam, gpu]
    
    - name: Shortcuts | Update desktop database
      ansible.builtin.command:
        cmd: "update-desktop-database {{ user_home }}/.local/share/applications/"
      become_user: "{{ user_name }}"
      changed_when: false
      when: user_name != 'root'
      tags: [software, steam, gpu]

    # --- KDE Specific Configuration ---
    - name: KDE | Ensure konsole directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.local/share/konsole"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0755'
      when: is_kde and user_name != 'root'
      tags: [software, kde, konsole]

    - name: KDE | Download konsole profile
      ansible.builtin.get_url:
        url: "{{ konsole_profile_url }}"
        dest: "{{ user_home }}/.local/share/konsole/kali-like-alt.profile"
        owner: "{{ user_name }}"
        mode: '0644'
      when: is_kde and user_name != 'root'
      tags: [software, kde, konsole]

    - name: KDE | Download konsole color scheme
      ansible.builtin.get_url:
        url: "{{ konsole_scheme_url }}"
        dest: "{{ user_home }}/.local/share/konsole/kali-like-alt.colorscheme"
        owner: "{{ user_name }}"
        mode: '0644'
      when: is_kde and user_name != 'root'
      tags: [software, kde, konsole]

    - name: KDE | Disable konsole 'Remember window size'
      community.general.ini_file:
        path: "{{ user_home }}/.config/konsolerc"
        section: "KonsoleWindow"
        option: RememberWindowSize
        value: "false"
        owner: "{{ user_name }}"
        mode: '0644'
      when: is_kde and user_name != 'root'
      tags: [software, kde, konsole]

    - name: KDE | Set default konsole profile
      community.general.ini_file:
        path: "{{ user_home }}/.config/konsolerc"
        section: "Desktop Entry"
        option: DefaultProfile
        value: "kali-like-alt.profile"
        owner: "{{ user_name }}"
        mode: '0644'
      when: is_kde and user_name != 'root'
      tags: [software, kde, konsole]

    # --- GNOME Specific Configuration (PTYxis) ---
    - name: GNOME | Set PTYxis terminal window size and behavior
      ansible.builtin.command: "gsettings set org.gnome.Ptyxis {{ item.key }} {{ item.value }}"
      become_user: "{{ user_name }}"
      loop:
        - { key: "restore-window-size", value: "{{ ptyxis_restore_window_size }}" }
        - { key: "default-columns", value: "{{ ptyxis_default_columns }}" }
        - { key: "default-rows", value: "{{ ptyxis_default_rows }}" }
      when: is_gnome and user_name != 'root'
      tags: [software, gnome, ptyxis]

    - name: GNOME | Set PTYxis cursor and font settings
      ansible.builtin.command: "dconf write /org/gnome/Ptyxis/{{ item.key }} \"{{ item.value }}\""
      become_user: "{{ user_name }}"
      loop:
        - { key: "cursor-shape", value: "'{{ ptyxis_cursor_shape }}'" }
        - { key: "cursor-blink-mode", value: "'{{ ptyxis_cursor_blink_mode }}'" }
        - { key: "use-system-font", value: "{{ ptyxis_use_system_font }}" }
        - { key: "font-name", value: "'{{ ptyxis_font_name }}'" }
      when: is_gnome and user_name != 'root'
      tags: [software, gnome, ptyxis]

    - name: GNOME | Get PTYxis default profile UUID
      ansible.builtin.shell: dconf read /org/gnome/Ptyxis/default-profile-uuid | tr -d "'"
      register: ptyxis_default_uuid
      become_user: "{{ user_name }}"
      changed_when: false
      when: is_gnome and user_name != 'root'
      tags: [software, gnome, ptyxis]

    - name: GNOME | Set PTYxis transparency
      ansible.builtin.command: "dconf write /org/gnome/Ptyxis/Profiles/{{ ptyxis_default_uuid.stdout }}/opacity {{ ptyxis_opacity }}"
      become_user: "{{ user_name }}"
      when: 
        - is_gnome 
        - user_name != 'root'
        - ptyxis_default_uuid.stdout != ""
      tags: [software, gnome, ptyxis]

    - name: Python | Ensure pipx path is in user shell configuration
      ansible.builtin.command:
        cmd: "pipx ensurepath"
      become_user: "{{ user_name }}"
      changed_when: false
      tags: [software, python, pipx]

    # --- Python Libraries ---
    - name: Python | Install specialized python libraries via pipx
      community.general.pipx:
        name: "{{ item }}"
        state: install
      become_user: "{{ user_name }}"
      loop:
        - markitdown
        - notebooklm-py
      tags: [software, python, markitdown, notebooklm]

    - name: Python | Install extra features and playwright into pipx environments
      ansible.builtin.command:
        cmd: "pipx inject {{ item.base }} {{ item.extra }}"
      become_user: "{{ user_name }}"
      loop:
        - { base: 'markitdown', extra: 'markitdown[pdf]' }
        - { base: 'markitdown', extra: 'markitdown[docx]' }
        - { base: 'notebooklm-py', extra: 'notebooklm-py[browser]' }
        - { base: 'notebooklm-py', extra: 'playwright' }
      changed_when: false
      tags: [software, python, markitdown, notebooklm]

    - name: Python | Install Playwright Chromium in notebooklm-py venv
      ansible.builtin.shell:
        cmd: "source {{ user_home }}/.local/share/pipx/venvs/notebooklm-py/bin/activate && playwright install chromium"
        executable: /bin/bash
      become_user: "{{ user_name }}"
      changed_when: false
      tags: [software, python, notebooklm, playwright]
