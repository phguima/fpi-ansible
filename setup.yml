---
- name: Fedora Post-Install Setup
  hosts: localhost
  become: yes
  vars_files:
    - vars/main.yml

  tasks:
    - name: Bootstrap | Upgrade all packages and refresh dnf cache
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes
      become: true
      tags: [system, bootstrap]

    - name: Bootstrap | Install dnf-plugins-core
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      tags: [system, bootstrap]
    
    # --- DNF Configuration ---
    - name: System | Optimize DNF Configuration
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        line: "{{ item.key }}={{ item.value }}"
        state: present
      loop:
        - { key: "max_parallel_downloads", value: "{{ dnf_max_parallel_downloads }}" }
        - { key: "fastestmirror", value: "{{ dnf_fastestmirror }}" }
      tags: [system, dnf]
    
    # --- Repositories ---
    - name: System | Add RPM Fusion Free repository
      ansible.builtin.dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes
      tags: [system, rpmfusion] 

    - name: System | Enable Flathub Repository
      ansible.builtin.shell: |
        flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      tags: [system, flatpak]

    # --- GRUB Configuration ---
    - name: System | Configure GRUB settings
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^{{ item.key }}='
        line: '{{ item.key }}={{ item.value }}'
        state: present
      loop:
        - { key: "GRUB_TIMEOUT", value: "{{ grub_timeout }}" }
        - { key: "GRUB_TERMINAL_OUTPUT", value: '"{{ grub_terminal_output }}"' }
        - { key: "GRUB_GFXPAYLOAD", value: '"{{ grub_gfxpayload }}"' }
        - { key: "GRUB_GFXMODE", value: '"{{ grub_gfxmode }}"' }
      notify: Regenerate GRUB
      tags: [system, grub]

    # --- Kernel Maintenance ---
    - name: Kernel | Prevent removal of debug packages if running debug kernel
      ansible.builtin.fail:
        msg: "You are currently running a DEBUG kernel ({{ ansible_kernel }}). Please boot into a normal kernel before proceeding."
      when: "'debug' in ansible_kernel"
      tags: [system, kernel]

    - name: Kernel | Get list of installed debug kernels
      ansible.builtin.shell: dnf repoquery --installed "kernel*debug*" -q
      register: installed_debug_kernels
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove kernel debug packages
      ansible.builtin.dnf:
        name: "{{ installed_debug_kernels.stdout_lines }}"
        state: absent
      when: installed_debug_kernels.stdout_lines | length > 0
      notify: Regenerate GRUB
      tags: [system, kernel]

    - name: Kernel | Disable debug repositories
      ansible.builtin.shell: dnf config-manager setopt "*debug*".enabled=0
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Get list of old kernels
      ansible.builtin.shell: dnf repoquery --installonly --latest-limit=-1 -q
      register: old_kernels_list
      changed_when: false
      tags: [system, kernel]

    - name: Kernel | Remove old kernels
      ansible.builtin.dnf:
        name: "{{ old_kernels_list.stdout_lines }}"
        state: absent
      when: old_kernels_list.stdout_lines | length > 0
      notify: Regenerate GRUB
      tags: [system, kernel]

    # --- Hardware & Drivers ---
    - name: Hardware | Detect GPU Type
      ansible.builtin.shell: lspci | grep -iE "vga|3d|display"
      register: gpu_info
      changed_when: false
      tags: [hardware]

    - name: Hardware | Install Intel Media Drivers
      ansible.builtin.dnf:
        name: "{{ intel_media_packages }}"
        state: present
      when: "'intel' in gpu_info.stdout | lower"
      tags: [hardware, intel]

    - name: Hardware | Install AMD VA-API and VDPAU (Freeworld)
      ansible.builtin.dnf:
        name: "{{ amd_multimedia_packages }}"
        state: present
        allowerasing: yes
      when: "'amd' in gpu_info.stdout | lower or 'ati' in gpu_info.stdout | lower"
      tags: [hardware, amd]

    # --- NVIDIA Driver Installation ---
    - name: Hardware | Detect NVIDIA Driver status
      ansible.builtin.command: nvidia-smi
      register: nvidia_smi_status
      ignore_errors: yes
      changed_when: false
      tags: [hardware, nvidia]

    - name: Hardware | Install NVIDIA Prerequisites (Stage 1)
      ansible.builtin.dnf:
        name: "{{ nvidia_packages_stage1 }}"
        state: present
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0"
      tags: [hardware, nvidia]

      # --- Nvidia Configuration and Power Management ---
    - name: Hardware | Check if MOK key exists
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: mok_key
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0"
      tags: [hardware, nvidia]

    - name: Hardware | Generate MOK key if missing
      ansible.builtin.command: kmodgenca -a
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0 and not mok_key.stat.exists"
      tags: [hardware, nvidia]

    - name: Hardware | Prompt for MOK enrollment
      ansible.builtin.pause:
        prompt: |
          >>> IMPORTANT: NVIDIA MOK Enrollment <<<
          A Secure Boot key must be imported. Please follow these steps:
          1. Open a separate terminal (or focus this shell with CTRL+F if interactive).
          2. Run: sudo mokutil --import /etc/pki/akmods/certs/public_key.der
          3. Set a password (easy to remember).
          4. After doing this, return here and press ENTER.
          >>> YOU WILL NEED TO REBOOT AFTER THIS PLAYBOOK FINISHES <<<
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0 and not mok_key.stat.exists"
      tags: [hardware, nvidia]

    - name: Hardware | Install NVIDIA Drivers (Stage 2)
      ansible.builtin.dnf:
        name: "{{ nvidia_packages_stage2 }}"
        state: present
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0"
      tags: [hardware, nvidia]

    - name: Hardware | Build NVIDIA kernel modules (akmods)
      ansible.builtin.command: akmods --force
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0"
      async: 600
      poll: 10
      tags: [hardware, nvidia]

    - name: Hardware | Update initramfs (dracut)
      ansible.builtin.command: dracut --force
      when: "'nvidia' in gpu_info.stdout | lower and nvidia_smi_status.rc != 0"
      tags: [hardware, nvidia]

    - name: Hardware | Enable NVIDIA Power Management services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: yes
      loop:
        - nvidia-suspend
        - nvidia-resume
        - nvidia-hibernate
      when: "'nvidia' in gpu_info.stdout | lower"
      tags: [hardware, nvidia]

    - name: Hardware | Configure NVIDIA Dynamic Power Management
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: "{{ nvidia_dpm_config }}"
        mode: '0644'
      when: "'nvidia' in gpu_info.stdout | lower"
      tags: [hardware, nvidia]

    - name: Hardware | Configure NVIDIA GLX Variables for ZSH
      ansible.builtin.blockinfile:
        path: "{{ ansible_env.HOME }}/.zshrc"
        marker: "# {mark} NVIDIA CONFIGURATION"
        block: |
          # Finer-Grained Control of GLX + OpenGL
          export __NV_PRIME_RENDER_OFFLOAD_PROVIDER=NVIDIA-G0
          export __GLX_VENDOR_LIBRARY_NAME=nvidia
        create: yes
      when: "'nvidia' in gpu_info.stdout | lower"
      tags: [hardware, nvidia]

  handlers:
    - name: Regenerate GRUB
      ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
